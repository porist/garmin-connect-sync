name: Build Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build macOS binary
        run: pyinstaller garmin.spec

      - name: Create ZIP
        run: |
          cd dist
          zip -r garmin-macos.zip garmin/
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garmin-macos
          path: dist/garmin-macos.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build Windows binary
        run: pyinstaller garmin.spec

      - name: Create ZIP
        run: |
          Compress-Archive -Path dist/garmin -DestinationPath dist/garmin-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garmin-windows
          path: dist/garmin-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pyinstaller-hooks-contrib

      - name: Build Linux binary
        run: pyinstaller garmin.spec

      - name: Create ZIP
        run: |
          cd dist
          zip -r garmin-linux.zip garmin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: garmin-linux
          path: dist/garmin-linux.zip

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create ZIP bundles
        run: |
          mkdir -p release
          cp artifacts/garmin-macos/garmin-macos.zip release/
          cp artifacts/garmin-windows/garmin-windows.zip release/
          cp artifacts/garmin-linux/garmin-linux.zip release/
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: |
            release/garmin-macos.zip
            release/garmin-windows.zip
            release/garmin-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
